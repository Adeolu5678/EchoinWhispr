name: Utilities CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Back-End/utilities/**'
      - '.github/workflows/utilities-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Back-End/utilities/**'
      - '.github/workflows/utilities-ci.yml'
  workflow_call:

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  lint-and-test:
    name: Lint and Test Utilities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get PNPM store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup PNPM cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-utilities-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-utilities-

      - name: Install dependencies
        working-directory: ./Back-End/utilities
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type checking
        working-directory: ./Back-End/utilities
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json found, skipping TypeScript check"
          fi

      - name: Run ESLint
        working-directory: ./Back-End/utilities
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            pnpm lint
          else
            echo "No ESLint configuration found, skipping linting"
          fi

      - name: Run tests
        working-directory: ./Back-End/utilities
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            pnpm test
          else
            echo "No test script found, skipping tests"
          fi

  build:
    name: Build Utilities Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get PNPM store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup PNPM cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-utilities-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-utilities-

      - name: Install dependencies
        working-directory: ./Back-End/utilities
        run: pnpm install --frozen-lockfile

      - name: Build utilities package
        working-directory: ./Back-End/utilities
        run: pnpm build

      - name: Verify build output
        run: |
          if [ ! -d "./Back-End/utilities/dist" ]; then
            echo "❌ Error: Build output directory dist not found"
            exit 1
          else
            echo "✅ Build output directory exists"
            ls -la ./Back-End/utilities/dist/
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: utilities-build
          path: ./Back-End/utilities/dist/
          retention-days: 7

      - name: Confirm artifact upload
        run: echo "✅ utilities-build artifact uploaded successfully"

  security-audit:
    name: Utilities Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        working-directory: ./Back-End/utilities
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        working-directory: ./Back-End/utilities
        run: pnpm audit --audit-level=moderate

      - name: Check for vulnerable dependencies
        working-directory: ./Back-End/utilities
        run: |
          if pnpm audit --audit-level=high; then
            echo "No high-severity vulnerabilities found"
          else
            echo "High-severity vulnerabilities detected"
            exit 1
          fi

      - name: Run Snyk security scan
        run: |
          if command -v snyk >/dev/null 2>&1; then
            cd ./Back-End/utilities && snyk test --severity-threshold=high
          else
            echo "Snyk not available, skipping security scan"
          fi

      - name: Verify build summary
        run: |
          echo "## 🔧 Utilities Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Linting**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Testing**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Building**: Successful" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Security Audit**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Package**: echoinwhispr-utilities" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Built at**: $(date)" >> $GITHUB_STEP_SUMMARY