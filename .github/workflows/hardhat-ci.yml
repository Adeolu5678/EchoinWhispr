name: Smart Contracts CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Back-End/smart-contracts/**'
      - 'Back-End/scripts/**'
      - '.github/workflows/hardhat-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Back-End/smart-contracts/**'
      - 'Back-End/scripts/**'
      - '.github/workflows/hardhat-ci.yml'
  workflow_call:

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  lint-and-test:
    name: Lint and Test Smart Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get PNPM store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup PNPM cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-hardhat-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-hardhat-

      - name: Install dependencies
        working-directory: ./Back-End/scripts
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript type checking
        working-directory: ./Back-End/scripts
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json found, skipping TypeScript check"
          fi

      - name: Run ESLint
        working-directory: ./Back-End/scripts
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            pnpm lint
          else
            echo "No ESLint configuration found, skipping linting"
          fi

      - name: Compile smart contracts
        working-directory: ./Back-End/scripts
        run: pnpm compile

      - name: Run smart contract tests
        working-directory: ./Back-End/scripts
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            pnpm test
          else
            echo "No test script found, skipping tests"
          fi

  security-audit:
    name: Smart Contracts Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Run Slither security analysis
        working-directory: ./Back-End/smart-contracts
        run: |
          if [ -d "." ] && ls *.sol >/dev/null 2>&1; then
            slither . --exclude-dependencies --exclude-informational --fail-high
          else
            echo "No Solidity files found, skipping Slither analysis"
          fi

      - name: Run Mythril security analysis
        run: |
          pip3 install mythril
          if [ -d "./Back-End/smart-contracts" ] && ls ./Back-End/smart-contracts/*.sol >/dev/null 2>&1; then
            mythril analyze ./Back-End/smart-contracts/*.sol --solc-json ./Back-End/scripts/hardhat.config.ts
          else
            echo "No Solidity files found, skipping Mythril analysis"
          fi

  build-and-deploy-testnet:
    name: Build and Deploy to Hedera Testnet
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-test, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get PNPM store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup PNPM cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-hardhat-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-hardhat-

      - name: Install dependencies
        working-directory: ./Back-End/scripts
        run: pnpm install --frozen-lockfile

      - name: Compile smart contracts
        working-directory: ./Back-End/scripts
        run: pnpm compile

      - name: Deploy to Hedera Testnet
        working-directory: ./Back-End/scripts
        run: pnpm deploy
        env:
          HEDERA_RPC_URL: ${{ secrets.HEDERA_TESTNET_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.HEDERA_TESTNET_PRIVATE_KEY }}
          HEDERA_ACCOUNT_ID: ${{ secrets.HEDERA_TESTNET_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "## 🚀 Smart Contracts Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Linting**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Testing**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Security Audit**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Compilation**: Successful" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Hedera Testnet Deployment**: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Network**: Hedera Testnet" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY